<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Konfigurasi Dasar Tema Global (Light Mode) */
        :root {
            --ios-bg: linear-gradient(135deg, #eef2f7 0%, #dfe6f0 100%);
            --ios-navbar: rgba(255, 255, 255, 0.75);
            --ios-card: rgba(255, 255, 255, 0.8);
            --ios-border: rgba(255, 255, 255, 0.4);
            --ios-text-main: #1d1d1f;
            --ios-text-muted: #86868b;
            --ios-input-bg: rgba(235, 235, 245, 0.6);
            --ios-list-item: rgba(242, 242, 247, 0.7);
            --ios-alert-bg: rgba(255, 255, 255, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.04);
            --hover-glow: rgba(0, 122, 255, 0.1);
        }

        /* Konfigurasi Tema (Dark Mode) */
        [data-theme="dark"] {
            --ios-bg: radial-gradient(circle at top right, #12131a, #08090c);
            --ios-navbar: rgba(20, 22, 33, 0.75);
            --ios-card: rgba(30, 33, 48, 0.6);
            --ios-border: rgba(255, 255, 255, 0.06);
            --ios-text-main: #f5f5f7;
            --ios-text-muted: #a1a1a6;
            --ios-input-bg: rgba(45, 48, 68, 0.5);
            --ios-list-item: rgba(45, 48, 68, 0.4);
            --ios-alert-bg: rgba(20, 22, 33, 0.8);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --hover-glow: rgba(0, 242, 254, 0.15);
        }

        body {
            background: var(--ios-bg) !important;
            color: var(--ios-text-main) !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .ios-navbar {
            background: var(--ios-navbar) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid var(--ios-border) !important;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .spa-container { 
            min-height: calc(100vh - 110px); 
        }

        /* Desain Sakelar Tombol Toggle Cerah/Malam khas iOS */
        .theme-switch-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 26px;
        }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e9e9ea;
            transition: .3s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light ios-navbar py-3 sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#" style="color: var(--ios-text-main); letter-spacing: -0.5px;">
                <i class="bi bi-buildings-fill text-primary" style="color: #007aff !important;"></i>
                <span>Smart City Portal</span>
            </a>
            
            <div class="ms-auto d-flex align-items-center gap-4">
                <div class="theme-switch-wrapper">
                    <i class="bi bi-sun-fill text-warning small"></i>
                    <label class="theme-switch">
                        <input type="checkbox" id="themeToggleCheckbox">
                        <span class="slider"></span>
                    </label>
                    <i class="bi bi-moon-stars-fill text-secondary small"></i>
                </div>

                <span class="small fw-semibold px-3 py-1.5 d-flex align-items-center gap-2" style="background: var(--ios-input-bg); color: var(--ios-text-main); border-radius: 20px; font-size: 0.8rem; transition: background 0.4s, color 0.4s;">
                    <i class="bi bi-circle-fill text-success small" style="font-size: 0.65rem;"></i>
                    <span>Warga Aktif</span>
                </span>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
