<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div id="app-content" class="container-fluid py-4">
    <div class="row g-4">
        
        <aside class="col-12 col-lg-3">
            <div class="card p-3 shadow-sm border mb-3 text-center">
                <div class="mb-2 text-end">
                    <button id="btnDarkModeToggle" class="btn btn-sm btn-outline-secondary" type="button">
                        <i class="bi bi-moon-stars-fill"></i>
                    </button>
                </div>
                <div class="position-relative d-inline-block mx-auto mb-2">
                    <div class="rounded-circle bg-primary bg-opacity-10 d-flex align-items-center justify-content-center" style="width: 70px; height: 70px;">
                        <i class="bi bi-person-fill text-primary fs-2"></i>
                    </div>
                    <span class="position-absolute bottom-0 end-0 p-1 bg-success border border-light rounded-circle"></span>
                </div>
                <h5 class="fw-bold mb-0" id="txtUsername">Portal Warga</h5>
                <p class="small text-muted mb-3">Smart City Tracker</p>
                
                <button class="btn btn-primary w-100 fw-bold mb-2 py-2" id="btnNewReport" type="button">
                    <i class="bi bi-plus-circle-fill me-2"></i>Laporan Baru
                </button>
                <button class="btn btn-outline-danger w-100 btn-sm fw-semibold" type="button" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Keluar
                </button>

                <hr class="my-3 text-muted">

                <div class="text-start">
                    <div class="small fw-bold text-uppercase text-secondary tracking-wider mb-2">
                        <i class="bi bi-bar-chart-fill me-1"></i>Rekap Status
                    </div>
                    <div class="d-flex align-items-center justify-content-between p-2 rounded bg-light mb-2 side-stat-box">
                        <span class="small text-muted"><i class="bi bi-file-earmark-text me-2 text-warning"></i>Draft</span>
                        <button type="button" class="badge bg-warning text-dark fw-bold border-0 px-3 py-2 btn-status-filter" id="badgeDraft" onclick="filterByStatus('draft')">0</button>
                    </div>
                    <div class="d-flex align-items-center justify-content-between p-2 rounded bg-light mb-2 side-stat-box">
                        <span class="small text-muted"><i class="bi bi-arrow-repeat me-2 text-primary"></i>Diproses</span>
                        <button type="button" class="badge bg-primary fw-bold border-0 px-3 py-2 btn-status-filter" id="badgeProcess" onclick="filterByStatus('process')">0</button>
                    </div>
                    <div class="d-flex align-items-center justify-content-between p-2 rounded bg-light side-stat-box">
                        <span class="small text-muted"><i class="bi bi-check-circle-fill me-2 text-success"></i>Selesai</span>
                        <button type="button" class="badge bg-success fw-bold border-0 px-3 py-2 btn-status-filter" id="badgeDone" onclick="filterByStatus('done')">0</button>
                    </div>
                </div>
            </div>
        </aside>

        <section class="col-12 col-lg-6">
            <div class="card p-2 shadow-sm border mb-3">
                <div class="nav nav-pills gap-1">
                    <button class="nav-link active fw-bold text-center flex-fill" id="tabMyReports" onclick="switchTab('my_reports')" type="button">
                        <i class="bi bi-person-lines-fill me-2"></i>Laporan Saya
                    </button>
                    <button class="nav-link fw-bold text-center flex-fill" id="tabFeed" onclick="switchTab('feed')" type="button">
                        <i class="bi bi-globe me-2"></i>Feed Kota
                    </button>
                </div>
            </div>

            <div id="listContainer" class="row g-3"></div>

            <div id="paginationContainer" class="d-flex justify-content-center gap-2 mt-4"></div>
        </section>

        <aside class="col-12 col-lg-3">
            <div class="card p-3 shadow-sm border">
                <h6 class="fw-bold mb-3"><i class="bi bi-info-circle-fill text-primary me-2"></i>Info Portal</h6>
                <div class="small text-secondary" style="line-height: 1.6;">
                    <div class="d-flex align-items-start mb-2">
                        <i class="bi bi-shield-check text-success me-2 mt-1"></i>
                        <span>Data laporan diproses valid oleh tim manajemen Smart City.</span>
                    </div>
                    <div class="d-flex align-items-start mb-2">
                        <i class="bi bi-clock-history text-warning me-2 mt-1"></i>
                        <span>Laporan berstatus <strong>DRAFT</strong> hanya terlihat oleh Anda sendiri.</span>
                    </div>
                    <div class="d-flex align-items-start">
                        <i class="bi bi-eye-slash text-muted me-2 mt-1"></i>
                        <span>Identitas pelapor asli pada menu Feed Kota disembunyikan (Anonim).</span>
                    </div>
                </div>
            </div>
        </aside>

    </div>
</div>

<div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow border-0">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold" id="reportModalLabel"><i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="reportForm">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Judul Laporan</label>
                        <input type="text" class="form-control" id="fieldTitle" placeholder="Contoh: Lampu Jalan Padam" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Kategori</label>
                        <select class="form-select" id="fieldCategory" required>
                            <option value="">-- Pilih Kategori --</option>
                            <option value="Infrastruktur">Infrastruktur</option>
                            <option value="Kesehatan">Kesehatan</option>
                            <option value="Keamanan">Keamanan</option>
                            <option value="Layanan Publik">Layanan Publik</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Lokasi Kejadian</label>
                        <input type="text" class="form-control" id="fieldLocation" placeholder="Nama jalan atau kecamatan" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Deskripsi Kronologi</label>
                        <textarea class="form-control" id="fieldDescription" rows="4" placeholder="Tulis rincian kendala secara jelas..." required></textarea>
                    </div>
                    <div class="d-flex justify-content-between pt-2">
                        <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft">Simpan Draft</button>
                        <button type="button" class="btn btn-primary fw-bold px-4" id="btnSubmit">
                            Ajukan <i class="bi bi-send-fill ms-1"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>
</body>
</html>
