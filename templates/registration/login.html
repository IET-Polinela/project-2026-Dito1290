{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="content-card">
            <div class="text-center mb-4">
                <h3 class="section-title mb-1">Login</h3>
                <p class="text-muted">Masuk untuk melihat dan mengelola laporan.</p>
            </div>
            <form method="post" class="row g-3">
                {% csrf_token %}
                <div class="col-12">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary btn-modern w-100">Login</button>
                </div>
            </form>
            <div class="mt-3 text-center">
                <small>Belum punya akun? <a href="{% url 'register' %}">Daftar</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
