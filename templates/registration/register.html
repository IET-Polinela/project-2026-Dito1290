{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="content-card">
            <div class="text-center mb-4">
                <h3 class="section-title mb-1">Daftar Citizen</h3>
                <p class="text-muted">Buat akun agar Anda bisa melaporkan masalah dengan cepat.</p>
            </div>
            <form method="post" class="row g-3">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="col-12">
                    <button type="submit" class="btn btn-success btn-modern w-100">Daftar</button>
                </div>
            </form>
            <div class="mt-3 text-center">
                <small>Sudah punya akun? <a href="{% url 'login' %}">Login</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
