{% extends 'base.html' %}

{% block content %}
<div class="content-card">
    <div class="mb-4">
        <h2 class="section-title">Hapus Laporan</h2>
        <p class="text-muted">Konfirmasi tindakan ini hanya akan menghapus laporan dari daftar. Data tidak dapat dikembalikan.</p>
    </div>
    <form method="post" class="d-flex flex-column flex-sm-row gap-2">
        {% csrf_token %}
        <button class="btn btn-danger btn-modern">Hapus</button>
        <a href="{% url 'report_list' %}" class="btn btn-outline-secondary btn-modern">Batal</a>
    </form>
</div>
{% endblock %}
